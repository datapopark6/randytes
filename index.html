<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Panorama 360 Giri</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        /* 2. Gaya untuk kontainer panorama */
        #panorama {
            width: 100%;       /* Lebar penuh layar */
            height: 80vh;      /* Tinggi 80% dari tinggi layar (viewport height) */
            background-color: #f0f0f0;
            margin: 0 auto;
        }
        
        /* Gaya tambahan agar halaman terlihat rapi */
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Pratinjau Foto 360 - Giri</h1>
    
    <div id="panorama"></div>
    
    <p>Klik dan seret pada gambar untuk melihat sekeliling.</p>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <script>
        // 5. Konfigurasi untuk memuat gambar 'giri.png'
        pannellum.viewer('panorama', {
            "type": "equirectangular",  // Format panorama standar
            
            // Perubahan di sini: Menggunakan file lokal giri.png
            "panorama": "giri.png", 
            
            "autoLoad": true,          // Muat otomatis
            "autoRotate": -1,          // Putar otomatis perlahan ke kiri
            "showControls": true       // Tampilkan tombol kontrol
        });
    </script>

</body>
</html>
